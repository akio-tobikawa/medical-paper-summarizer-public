name: Daily AMS Paper Summary and Email

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

concurrency:
  group: daily-summary
  cancel-in-progress: false

jobs:
  run-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Validate required secrets
        run: |
          missing=""
          [ -z "$ANTHROPIC_API_KEY" ] && missing="$missing ANTHROPIC_API_KEY"
          [ -z "$NCBI_EMAIL" ]        && missing="$missing NCBI_EMAIL"
          [ -z "$NCBI_API_KEY" ]      && missing="$missing NCBI_API_KEY"
          [ -z "$GMAIL_USERNAME" ]    && missing="$missing GMAIL_USERNAME"
          [ -z "$GMAIL_APP_PASSWORD" ] && missing="$missing GMAIL_APP_PASSWORD"
          [ -z "$GMAIL_RECIPIENT" ]   && missing="$missing GMAIL_RECIPIENT"
          if [ -n "$missing" ]; then
            echo "エラー: 以下のSecretsが設定されていません:$missing"
            exit 1
          fi
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_EMAIL:         ${{ secrets.NCBI_EMAIL }}
          NCBI_API_KEY:       ${{ secrets.NCBI_API_KEY }}
          GMAIL_USERNAME:     ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT:    ${{ secrets.GMAIL_RECIPIENT }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AMS summarizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_EMAIL:        ${{ secrets.NCBI_EMAIL }}
          NCBI_API_KEY:      ${{ secrets.NCBI_API_KEY }}
        run: |
          mkdir -p output
          rm -f output/*.docx
          python main.py

      - name: Find output file
        id: find_file
        run: |
          WORD_FILE=$(ls -t output/*.docx 2>/dev/null | head -n 1 || true)
          if [ -z "$WORD_FILE" ] || [ ! -f "$WORD_FILE" ]; then
            echo "本日の新規論文はありませんでした。"
            echo "file_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "file_path=$WORD_FILE"            >> $GITHUB_OUTPUT
          echo "file_name=$(basename $WORD_FILE)" >> $GITHUB_OUTPUT
          echo "file_found=true"                  >> $GITHUB_OUTPUT

      - name: Send Summary via Email
        if: steps.find_file.outputs.file_found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: 🦠【AMS論文レビュー】感染症・抗菌薬適正使用 最新論文レポート
          to: ${{ secrets.GMAIL_RECIPIENT }}
          from: "AMS論文自動要約システム"
          body: |
            本日の感染症・AMS最新論文要約が完成しました。
            添付のWordファイルをご確認ください。
            --
            Powered by Claude AI + PubMed API
          attachments: ${{ steps.find_file.outputs.file_path }}

      - name: Save history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.json
          git commit -m "chore: Update paper history [skip ci]" || echo "No changes to commit"
          git pull --rebase --autostash origin ${{ github.ref_name }}
          git push
