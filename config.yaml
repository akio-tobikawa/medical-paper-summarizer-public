# ===================================================================
# 医学論文自動収集・要約システム 設定ファイル
# 感染症科 / 抗菌薬適正使用支援（AMS）専用設定
# Yokosuka City University Medical Center - 薬剤部
# ===================================================================

# --- 検索設定 ---
search:
  days_back: 7
  max_results: 200
  top_n: 10
  detailed_top_n: 10

# --- 専門領域名（表示・プロンプトに使用） ---
specialty_name: "感染症科・AMS（抗菌薬適正使用支援）"

# --- 専門領域 ---
specialties:
  primary:
    - antimicrobial stewardship
    - antibiotic stewardship
    - infectious disease
    - bacteremia
    - sepsis
    - bloodstream infection
    - antimicrobial resistance
    - multidrug resistant
    - carbapenem-resistant
    - MRSA
    - vancomycin-resistant
    - ESBL
    - de-escalation
    - IV to oral
    - antibiotic duration
    - antibiotic prophylaxis
    - surgical site infection
    - perioperative prophylaxis
  secondary:
    - Staphylococcus aureus
    - Pseudomonas aeruginosa
    - Enterococcus
    - Klebsiella pneumoniae
    - Acinetobacter baumannii
    - Clostridioides difficile
    - Candida
    - fungal infection
    - pneumonia
    - urinary tract infection
    - intraabdominal infection
    - endocarditis
    - osteomyelitis
    - meningitis
    - febrile neutropenia
    - COVID-19
    - influenza
    - PK/PD
    - minimum inhibitory concentration
    - therapeutic drug monitoring
    - vancomycin AUC
    - beta-lactam

# --- 優先ジャーナル ---
journals:
  # Tier 1 - 感染症・AMS最高権威誌 + 総合医学誌
  tier1:
    - "Clin Infect Dis"
    - "Lancet Infect Dis"
    - "JAMA"
    - "N Engl J Med"
    - "Lancet"
    - "BMJ"
    - "Ann Intern Med"
    - "Nat Med"
    - "J Infect Dis"
    - "Antimicrob Agents Chemother"
  # Tier 2 - 感染症・抗菌薬専門誌
  tier2:
    - "J Antimicrob Chemother"
    - "Int J Antimicrob Agents"
    - "Infect Control Hosp Epidemiol"
    - "Am J Infect Control"
    - "Open Forum Infect Dis"
    - "Clin Microbiol Infect"
    - "Eur J Clin Microbiol Infect Dis"
    - "Diagn Microbiol Infect Dis"
    - "J Hosp Infect"
    - "Infection"
  # Tier 3 - 重症系・関連専門誌
  tier3:
    - "Intensive Care Med"
    - "Crit Care Med"
    - "Crit Care"
    - "Chest"
    - "JAMA Intern Med"
    - "JAMA Netw Open"
    - "Am J Respir Crit Care Med"
    - "Ann Emerg Med"
    - "J Clin Microbiol"
    - "Microbiol Spectr"
    - "Antibiotics (Basel)"
    - "Pathogens"
    - "Emerg Infect Dis"
    - "Euro Surveill"

# --- 論文タイプスコア ---
study_type_scores:
  "Randomized Controlled Trial": 10
  "Meta-Analysis": 9
  "Systematic Review": 9
  "Clinical Trial": 8
  "Multicenter Study": 7
  "Observational Study": 6
  "Cohort Study": 6
  "Practice Guideline": 10
  "Guideline": 10
  "Review": 4
  "Case Reports": 1
  "Editorial": 2
  "Comment": 1
  "Letter": 1

# --- 除外する論文タイプ ---
exclude_types:
  - "Case Reports"
  - "Editorial"
  - "Comment"
  - "Letter"
  - "Published Erratum"

# --- AI要約設定（Claude API） ---
ai:
  # Claude モデル フォールバックチェーン（順に試行）
  model_chain:
    - "claude-opus-4-7"
    - "claude-sonnet-4-6"
    - "claude-haiku-4-5-20251001"
  timeout: 120
  max_retries: 3
  retry_delay: 5

# --- 出力設定 ---
output:
  directory: "output"
  filename_format: "AMS論文レビュー_{date}.docx"

# --- 履歴管理 ---
history:
  file: "history.json"
  retention_days: 180

# --- 臨床関連性スコア設定（AMS特化） ---
clinical_relevance:
  # 高臨床的価値キーワード（+5点）
  high_value:
    - "randomized controlled trial"
    - "clinical practice guideline"
    - "treatment outcome"
    - "all-cause mortality"
    - "clinical failure"
    - "microbiological eradication"
    - "primary endpoint"
    - "de-escalation"
    - "iv to oral"
    - "intravenous to oral"
    - "antibiotic duration"
    - "days of therapy"
    - "antibiotic stewardship program"
    - "carbapenem-sparing"
    - "30-day mortality"
    - "90-day mortality"
    - "treatment success"
    - "resistance emergence"
  # 実臨床への応用性キーワード（+3点）
  practical:
    - "real-world"
    - "routine clinical"
    - "pragmatic"
    - "clinical decision"
    - "patient management"
    - "standard of care"
    - "clinical practice"
    - "clinical outcome"
    - "optimal duration"
    - "dose optimization"
    - "therapeutic drug monitoring"
    - "AUC-guided"
    - "PK/PD"
    - "hospital-acquired"
    - "healthcare-associated"
    - "intensive care unit"
    - "surgical prophylaxis"
    - "perioperative"
  # 日本・アジア人データ（+2点）
  japan_relevant:
    - "japanese"
    - "asian"
    - "japan"
    - "east asian"
    - "asia-pacific"

# --- 基礎研究除外フレーズ ---
basic_science_exclude:
  - "in vitro"
  - "mouse model"
  - "rat model"
  - "cell line"
  - "ex vivo"
  - "murine"
  - "knockout mice"
  - "animal model"
  - "zebrafish"
  - "in vivo murine"

# --- AMS特化ボーナススコア設定（+3点） ---
ams_high_priority:
  interventions:
    - "antibiotic stewardship"
    - "antimicrobial stewardship"
    - "de-escalation"
    - "iv-to-oral"
    - "intravenous to oral switch"
    - "duration of therapy"
    - "antibiotic duration"
    - "days of antibiotic"
    - "surgical prophylaxis"
    - "perioperative antimicrobial"
  pathogens:
    - "MRSA"
    - "methicillin-resistant Staphylococcus aureus"
    - "carbapenem-resistant"
    - "CRE"
    - "VRE"
    - "ESBL"
    - "Clostridioides difficile"
    - "CDI"
    - "Candida auris"
    - "pandrug-resistant"
    - "extensively drug-resistant"
  biomarkers:
    - "procalcitonin"
    - "PCT-guided"
    - "beta-D-glucan"
    - "galactomannan"
    - "blood culture"
    - "AUC/MIC"
    - "time to positivity"

